<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Change Password</title>
    <link rel="stylesheet" href="../../styles/profile/change-password.css">
</head>

<body>
    <header>
        <nav class="icon">
            <img src="../../assets/icons/ewallet/e-wallet.png" alt="E-Wallet">
            <span>E-Wallet</span>
        </nav>
        <nav class="profile">
            <p>Ghaluh Wizard</p>
            <div class="photo">
                <img src="../../assets/icons/dashboard/dashboard-v1/profile.png" alt="Profile">
            </div>
            <section class="drop-button">
                <img src="../../assets/icons/dashboard/dashboard-v1/down.svg" alt="Dropdown">
            </section>
        </nav>
    </header>
    <hr>
    <section class="container">
        <aside class="navside">
            <nav>
                <button>
                    <section class="icon"><img src="../../assets/icons/dashboard/dashboard-v1/transaction/dashboard.svg"
                            alt=""></section>
                    <section class="text">Dashboard</section>
                </button>
                <button>
                    <section class="icon"><img src="../../assets/icons/dashboard/dashboard-v1/send.svg" alt="">
                    </section>
                    <section class="text">Transfer</section>
                </button>
                <button>
                    <section class="icon"><img src="../../assets/icons/dashboard/dashboard-v1/history.svg" alt="">
                    </section>
                    <section class="text">History</section>
                </button>
                <button>
                    <section class="icon"><img src="../../assets/icons/dashboard/dashboard-v1/upload.svg" alt="">
                    </section>
                    <section class="text">Top up</section>
                </button>
                <button>
                    <section class="icon"><img src="../../assets/icons/dashboard/dashboard-v1/users.svg" alt="">
                    </section>
                    <section class="text">Profile</section>
                </button>
                <button>
                    <section class="icon"><img src="../../assets/icons/dashboard/dashboard-v1/exit.svg" alt="">
                    </section>
                    <section class="text">Exit</section>
                </button>
            </nav>
        </aside>
        <main>
            <section class="page-title">
                <img src="../../assets/icons/profile/user-blue.svg" alt="">
                <p>Profile</p>
            </section>

            <section class="password-wrap">
                <section class="container">
                    <p class="title">Change Password</p>

                    <section class="field">
                        <p class="label">Existing Password</p>
                        <section class="input-wrap">
                            <img src="../../assets/icons/input/password.png" alt="">
                            <input type="password" placeholder="Enter Your Existing Password">
                            <button class="eye-btn">
                                <img src="../../assets/icons/input/EyeSlash.png" alt="">
                            </button>
                        </section>
                    </section>

                    <section class="field">
                        <p class="label">New Password</p>
                        <section class="input-wrap">
                            <img src="../../assets/icons/input/password.png" alt="">
                            <input type="password" placeholder="Enter Your New Password">
                            <button class="eye-btn">
                                <img src="../../assets/icons/input/EyeSlash.png" alt="">
                            </button>
                        </section>
                    </section>

                    <section class="field">
                        <p class="label">Confirm New Password</p>
                        <section class="input-wrap">
                            <img src="../../assets/icons/input/password.png" alt="">
                            <input type="password" placeholder="Re-Type Your New Password">
                            <button class="eye-btn">
                                <img src="../../assets/icons/input/EyeSlash.png" alt="">
                            </button>
                        </section>
                    </section>

                    <section class="submit-button">
                        <button class="btn" type="submit">Submit</button>
                    </section>
                </section>
            </section>
        </main>
    </section>
</body>

</html>

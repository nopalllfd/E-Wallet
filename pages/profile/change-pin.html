<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Change Pin</title>
    <link rel="stylesheet" href="../../styles/profile/change-pin.css">
</head>

<body>
    <header>
        <nav class="icon">
            <img src="../../assets/icons/ewallet/e-wallet.png" alt="E-Wallet">
            <span>E-Wallet</span>
        </nav>
        <nav class="profile">
            <p>Ghaluh Wizard</p>
            <div class="photo">
                <img src="../../assets/icons/dashboard/dashboard-v1/profile.png" alt="Profile">
            </div>
            <section class="drop-button">
                <img src="../../assets/icons/dashboard/dashboard-v1/down.svg" alt="Dropdown">
            </section>
        </nav>
    </header>
    <hr>
    <section class="container">
        <aside class="navside">
            <nav>
                <button>
                    <section class="icon"><img src="../../assets/icons/dashboard/dashboard-v1/transaction/dashboard.svg"
                            alt=""></section>
                    <section class="text">Dashboard</section>
                </button>
                <button>
                    <section class="icon"><img src="../../assets/icons/dashboard/dashboard-v1/send.svg" alt="">
                    </section>
                    <section class="text">Transfer</section>
                </button>
                <button>
                    <section class="icon"><img src="../../assets/icons/dashboard/dashboard-v1/transaction/history.svg"
                            alt=""></section>
                    <section class="text">History</section>
                </button>
                <button>
                    <section class="icon"><img src="../../assets/icons/dashboard/dashboard-v1/upload.svg" alt="">
                    </section>
                    <section class="text">Top up</section>
                </button>
                <button>
                    <section class="icon"><img src="../../assets/icons/dashboard/dashboard-v1/users.svg" alt="">
                    </section>
                    <section class="text">Profile</section>
                </button>
                <button>
                    <section class="icon"><img src="../../assets/icons/dashboard/dashboard-v1/exit.svg" alt="">
                    </section>
                    <section class="text">Exit</section>
                </button>
            </nav>
        </aside>
        <main>
            <section class="page-title">
                <img src="../../assets/icons/dashboard/dashboard-v1/users.svg" alt="">
                <p>Profile</p>
            </section>

            <section class="pin-wrap">
                <section class="container">
                    <section class="primary-text">
                        <p>Change Pin 👋</p>
                    </section>
                    <section class="secondary-text">
                        <p>Please save your pin because this so important.</p>
                    </section>
                    <section class="input-group">
                        <section class="pin">
                            <input type="text" class="pin-input" maxlength="1" inputmode="numeric">
                            <input type="text" class="pin-input" maxlength="1" inputmode="numeric">
                            <input type="text" class="pin-input" maxlength="1" inputmode="numeric">
                            <input type="text" class="pin-input" maxlength="1" inputmode="numeric">
                            <input type="text" class="pin-input" maxlength="1" inputmode="numeric">
                            <input type="text" class="pin-input" maxlength="1" inputmode="numeric">
                        </section>
                        <section class="submit-button">
                            <button class="btn" type="submit">Submit</button>
                        </section>
                    </section>
                </section>
            </section>
        </main>
    </section>
</body>

</html>

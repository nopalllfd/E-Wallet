<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Profile</title>
    <link rel="stylesheet" href="../../styles/profile/edit-profile.css">
</head>

<body>
    <header>
        <nav class="icon">
            <img src="../../assets/icons/ewallet/e-wallet.png">
            <span>E-Wallet</span>
        </nav>
        <nav class="profile">
            <p>Ghaluh Wizard</p>
            <div class="photo">
                <img src="../../assets/icons/dashboard/dashboard-v1/profile.png" alt="">
            </div>
            <section class="drop-button">
                <img src="../../assets/icons/dashboard/dashboard-v1/down.svg" alt="">
            </section>
        </nav>
    </header>
    <hr>
    <section class="container">
        <aside class="navside">
            <nav>
                <button>
                    <section class="icon"><img src="../../assets/icons/dashboard/dashboard-v1/transaction/dashboard.svg"
                            alt=""></section>
                    <section class="text">Dashboard</section>
                </button>
                <button>
                    <section class="icon"><img src="../../assets/icons/dashboard/dashboard-v1/send.svg" alt="">
                    </section>
                    <section class="text">Transfer</section>
                </button>
                <button>
                    <section class="icon"><img src="../../assets/icons/dashboard/dashboard-v1/transaction/history.svg"
                            alt=""></section>
                    <section class="text">History</section>
                </button>
                <button>
                    <section class="icon"><img src="../../assets/icons/dashboard/dashboard-v1/upload.svg" alt="">
                    </section>
                    <section class="text">Top up</section>
                </button>
                <button>
                    <section class="icon"><img src="../../assets/icons/dashboard/dashboard-v1/users.svg" alt="">
                    </section>
                    <section class="text">Profile</section>
                </button>
                <button>
                    <section class="icon"><img src="../../assets/icons/dashboard/dashboard-v1/exit.svg" alt="">
                    </section>
                    <section class="text">Exit</section>
                </button>
            </nav>
        </aside>
        <main>
            <section class="container">
                <section class="section">
                    <section class="icon">
                        <img src="../../assets/icons/dashboard/dashboard-v1/users.svg" alt="">
                        <strong>Profile</strong>
                    </section>
                </section>
                <div class="table">
                    <section class="form-table">
                        <section class="profile-picture">
                            <p class="label"><strong>Profile Picture</strong></p>
                            <section class="picture-wrap">
                                <section class="avatar">
                                    <img src="../../assets/icons/profile/user.svg" alt="">
                                </section>
                                <section class="picture-actions">
                                    <button class="btn-change">
                                        <img src="../../assets/icons/profile/edit.svg" alt="">
                                        Change Profile
                                    </button>
                                    <button class="btn-delete">
                                        <img src="../../assets/icons/profile/delete.svg" alt="">
                                        Delete Profile
                                    </button>
                                </section>
                            </section>
                            <p class="hint">The profile picture must be 512 x 512 pixels or less</p>
                        </section>
                        <section class="field">
                            <p class="label">Full Name</p>
                            <section class="input-wrap">
                                <img src="../../assets/icons/profile/user.svg" alt="">
                                <input type="text" placeholder="Enter Full Name">
                            </section>
                        </section>
                        <section class="field">
                            <p class="label">Phone</p>
                            <section class="input-wrap">
                                <img src="../../assets/icons/profile/phone.svg" alt="">
                                <input type="text" placeholder="Enter Your Number Phone">
                            </section>
                        </section>
                        <section class="field">
                            <p class="label">Email</p>
                            <section class="input-wrap">
                                <img src="../../assets/icons/profile/email.svg" alt="">
                                <input type="text" placeholder="Enter Your Email">
                            </section>
                        </section>
                        <section class="field">
                            <p class="label">Password</p>
                            <a class="link" href="#">Change Password</a>
                        </section>
                        <section class="field">
                            <p class="label">Pin</p>
                            <a class="link" href="#">Change Pin</a>
                        </section>
                        <button class="btn-submit">Submit</button>
                    </section>
                </div>
            </section>
        </main>
    </section>
</body>

</html>

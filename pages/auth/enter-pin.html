<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enter Pin</title>
    <link rel="stylesheet" href="../../styles/auth/enter-pin.css">
</head>
<body>
    <main>
        <section class="form">
            <section class="container">
                <section class="icon">
                <img src="../../assets/icons/ewallet/e-wallet.png" width="32px">
                <span>E-Wallet</span>

                </section>
                <section class="primary-text">
                    <p>Enter Your Pin 👋</p>
                </section>
                <section class="secondary-text">
                    <p>Please save your pin because this so important.</p>
                </section>
                <section class="input-group">
                     <section class="pin">
                        <input type="text" class="pin-input" maxlength="1" inputmode="numeric">
                        <input type="text" class="pin-input" maxlength="1" inputmode="numeric">
                        <input type="text" class="pin-input" maxlength="1" inputmode="numeric">
                        <input type="text" class="pin-input" maxlength="1" inputmode="numeric">
                        <input type="text" class="pin-input" maxlength="1" inputmode="numeric">
                        <input type="text" class="pin-input" maxlength="1" inputmode="numeric">
                    </section>
                    <section class="submit-button">
                        <button class="btn" type="submit">Submit</button>
                    </section>
                    <section class="reset-pin">
                        <p class="">Forgot Your Pin? <a href="reset-pin.html">Reset</a></p>
                    </section>
                </section>
            </section>
        </section>
        <section class="icon-tab">
            <img src="../../assets/icons/ewallet/pin-human.png" alt="human-icon">
        </section>
    </main>
</body>
</html>

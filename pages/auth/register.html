<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register</title>
  <link rel="stylesheet" href="../../styles/global.css" />
  <link rel="stylesheet" href="../../styles/auth/register.css" />
</head>

<body>
  <main>
    <form class="form" action="login.html" method="get">
      <section class="container">
        <header class="icon">
          <img src="../../assets/icons/ewallet/e-wallet.png" width="32" alt="E-Wallet logo" />
          <span>E-Wallet</span>
        </header>

        <header class="primary-text">
          <h1>Start Accessing Banking Needs With All Devices and All Platforms With 30.000+ Users</h1>
        </header>

        <p class="secondary-text">Transfering money is easier than ever, you can access Zwalllet wherever you are.
          Desktop, laptop, mobile phone? we cover all of that for you!</p>

        <section aria-label="Sign in providers">
          <section class="google-sign">
            <button type="button">
              <img src="../../assets/icons/socials/google.png" alt="" /><span>Sign In With Google</span>
            </button>
          </section>
          <section class="facebook-sign">
            <button type="button">
              <img src="../../assets/icons/socials/facebook.png" alt="" /><span>Sign In With Facebook</span>
            </button>
          </section>
        </section>

        <section class="break-line" aria-hidden="true">
          <span class="first-line"></span>
          <span class="hr-lines">Or</span>
          <span class="second-line"></span>
        </section>

        <section class="input-group" aria-label="Register form">
          <section class="email">
            <label class="label label-email" for="email">Email</label>
            <img class="input-icon" src="../../assets/icons/input/email.png" alt="" />
            <input id="email" name="email" class="input input-email" type="email" placeholder="Enter Your Email"
              autocomplete="email" required />
          </section>
          <section class="password">
            <label class="label label-password" for="password">Password</label>
            <img class="input-icon" src="../../assets/icons/input/password.png" alt="" />
            <input id="password" name="password" type="password" class="input input-password"
              placeholder="Enter Your Password" autocomplete="new-password" required />
            <img class="eyelash" src="../../assets/icons/input/EyeSlash.png" alt="" />
          </section>
          <section class="confirm-password">
            <label class="label label-confirm-password" for="confirm-password">Confirm Password</label>
            <img class="input-icon" src="../../assets/icons/input/password.png" alt="" />
            <input id="confirm-password" name="confirm_password" type="password" class="input input-confirm-password"
              placeholder="Enter Your Password Again" autocomplete="new-password" required />
            <img class="eyelash" src="../../assets/icons/input/EyeSlash.png" alt="" />
          </section>
          <section class="register-button">
            <button class="btn" type="submit">Register</button>
          </section>
          <section class="opsional-login">
            <p>Have An Account? <a href="login.html">Login</a></p>
          </section>
        </section>
      </section>
    </form>
    <figure class="icon-tab">
      <img src="../../assets/icons/ewallet/register-ewallet.png" alt="hand-wallet" />
    </figure>
  </main>
</body>

</html>

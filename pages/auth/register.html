<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register</title>
  <link rel="stylesheet" href="../../styles/auth/register.css" />
</head>

<body>
  <main>
    <form class="form">
      <section class="container">
        <section class="icon">
          <img src="../../assets/icons/ewallet/e-wallet.png" width="32px" />
          <span>E-Wallet</span>
        </section>
        <section class="primary-text">
          <p>Start Accessing Banking Needs With All Devices and All Platforms With 30.000+ Users</p>
        </section>
        <section class="secondary-text">
          <p>Transfering money is easier than ever, you can access Zwalllet wherever you are. Desktop, laptop, mobile
            phone? we cover all of that for you!</p>
        </section>
        <section class="google-sign">
          <button>
            <img src="../../assets/icons/socials/google.png" alt="" /><span>Sign In With Google</span>
          </button>
        </section>
        <section class="facebook-sign">
          <button>
            <img src="../../assets/icons/socials/facebook.png" alt="" /><span>Sign In With Facebook</span>
          </button>
        </section>
        <section class="break-line">
          <span class="first-line"></span>
          <span class="hr-lines">Or</span>
          <span class="second-line"></span>
        </section>
        <section class="input-group">
          <section class="email">
            <label class="label label-email" for="email">
              <p>Email</p>
            </label>
            <img class="input-icon" src="../../assets/icons/input/email.png" alt="" />
            <input class="input input-email" type="email" placeholder="Enter Your Email" />
          </section>
          <section class="password">
            <label class="label label-password" for="">
              <p>Password</p>
            </label>
            <img class="input-icon" src="../../assets/icons/input/password.png" alt="" />
            <input type="password" class="input input-password" placeholder="Enter Your Password" />
            <img class="eyelash" src="../../assets/icons/input/EyeSlash.png" alt="" />
          </section>
          <section class="confirm-password">
            <label class="label label-confirm-password" for="confirm-password">
              <p>Confirm Password</p>
            </label>
            <img class="input-icon" src="../../assets/icons/input/password.png" alt="" />
            <input type="password" class="input input-confirm-password" placeholder="Enter Your Password Again" />
            <img class="eyelash" src="../../assets/icons/input/EyeSlash.png" alt="" />
          </section>
          <section class="register-button">
            <button class="btn" type="submit">
              Register
            </button>
          </section>
          <section class="opsional-login">
            <p class="">Have An Account? <a href="login.html">Login</a></p>
          </section>
        </section>
      </section>
    </form>
    <section class="icon-tab">
      <img src="../../assets/icons/ewallet/register-ewallet.png" alt="hand-wallet" />
    </section>
  </main>
</body>

</html>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password</title>
    <link rel="stylesheet" href="../../styles/global.css">
    <link rel="stylesheet" href="../../styles/auth/forgot-password.css">
</head>

<body>
    <main>
        <form class="form" action="login.html" method="get">
            <section class="container">
                <header class="icon">
                    <img src="../../assets/icons/ewallet/e-wallet.png" width="32" alt="E-Wallet logo">
                    <span>E-Wallet</span>
                </header>

                <header class="primary-text">
                    <h1>Hello Welcome Back 👋</h1>
                </header>

                <p class="secondary-text">We will send new password to your email</p>

                <section class="input-group" aria-label="Reset password form">
                    <section class="email">
                        <label class="label label-email" for="email">Email</label>
                        <img class="input-icon" src="../../assets/icons/input/email.png" alt="">
                        <input id="email" name="email" class="input input-email" type="email"
                            placeholder="Enter Your Email" autocomplete="email" required>
                    </section>
                    <section class="submit-button">
                        <button class="btn" type="submit">Submit</button>
                    </section>
                </section>
            </section>
        </form>
    </main>
</body>

</html>

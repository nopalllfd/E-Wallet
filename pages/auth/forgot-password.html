<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password</title>
    <link rel="stylesheet" href="../../styles/auth/forgot-password.css">
</head>

<body>
    <main>
        <form class="form">
            <section class="container">
                <section class="icon">
                    <img src="../../assets/icons/ewallet/e-wallet.png" width="32px">
                    <span>E-Wallet</span>

                </section>
                <section class="primary-text">
                    <p>Hello Welcome Back 👋</p>
                </section>
                <section class="secondary-text">
                    <p>We will send new password to your email</p>
                </section>
                <section class="input-group">
                    <section class="email">
                        <label class="label label-email" for="email">
                            <p>Email</p>
                        </label>
                        <img class="input-icon" src="../../assets/icons/input/email.png" alt="">
                        <input class="input input-email" type="email" placeholder="Enter Your Email">
                    </section>
                    <section class="submit-button">
                        <button class="btn" type="submit">Submit</button>
                    </section>
                </section>
            </section>
        </form>
    </main>
</body>

</html>

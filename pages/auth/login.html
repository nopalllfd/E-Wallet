<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="../../styles/global.css">
    <link rel="stylesheet" href="../../styles/auth/login.css">
</head>

<body>
    <main>
        <form class="form" action="../../index.html" method="get">
            <section class="container">
                <header class="icon">
                    <img src="../../assets/icons/ewallet/e-wallet.png" width="32" alt="E-Wallet logo">
                    <span>E-Wallet</span>
                </header>

                <header class="primary-text">
                    <h1>Hello Welcome Back 👋</h1>
                </header>

                <p class="secondary-text">Fill out the form correctly or you can login with several option.</p>

                <section aria-label="Sign in providers">
                    <section class="google-sign">
                        <button type="button">
                            <img src="../../assets/icons/socials/google.png" alt="Google logo">
                            <span>Sign In With Google</span>
                        </button>
                    </section>
                    <section class="facebook-sign">
                        <button type="button">
                            <img src="../../assets/icons/socials/facebook.png" alt="Facebook logo">
                            <span>Sign In With Facebook</span>
                        </button>
                    </section>
                </section>

                <section class="break-line" aria-hidden="true">
                    <span class="first-line"></span>
                    <span class="hr-lines">Or</span>
                    <span class="second-line"></span>
                </section>

                <section class="input-group" aria-label="Login form">
                    <section class="email">
                        <label class="label label-email" for="email">Email</label>
                        <img class="input-icon" src="../../assets/icons/input/email.png" alt="Email icon">
                        <input id="email" name="email" class="input input-email" type="email"
                            placeholder="Enter Your Email" autocomplete="email" required>
                    </section>
                    <section class="password">
                        <label class="label label-password" for="password">Password</label>
                        <img class="input-icon" src="../../assets/icons/input/password.png" alt="Password icon">
                        <input id="password" name="password" type="password" class="input input-password"
                            placeholder="Enter Your Password" autocomplete="current-password" required>
                        <img class="eyelash" src="../../assets/icons/input/EyeSlash.png" alt="Toggle password visibility icon">
                    </section>
                    <section class="forgot-password">
                        <a href="forgot-password.html">Forgot Password?</a>
                    </section>
                    <section class="login-button">
                        <button class="btn" type="submit">Login</button>
                    </section>
                    <section class="opsional-login">
                        <p>Not Have An Account? <a href="register.html">Register</a></p>
                    </section>
                </section>
            </section>
        </form>

        <figure class="icon-tab">
            <img src="../../assets/icons/ewallet/login-ewallet.png" alt="E-Wallet illustration">
        </figure>
    </main>
</body>

</html>

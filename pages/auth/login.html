<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="../../styles/auth/login.css">
</head>
<body>
    <main>
        <section class="form">
            <section class="container">
                <section class="icon">
                <img src="../../assets/icons/ewallet/e-wallet.png" width="32px">
                <span>E-Wallet</span>

                </section>
                <section class="primary-text">
                    <p>Hello Welcome Back 👋</p>
                </section>
                <section class="secondary-text">
                    <p>Fill out the form correctly or you can login with several option.</p>
                </section>
                <section class="google-sign">
                    <button><img src="../../assets/icons/socials/google.png" alt=""><span>Sign In With Google</span></button>
                </section>
                <section class="facebook-sign">
                    <button><img src="../../assets/icons/socials/facebook.png" alt=""><span>Sign In With Facebook</span></button>
                </section>
                <section class="break-line">
                    <span class="first-line"></span>
                    <span class="hr-lines">Or</span>
                    <span class="second-line"></span>
                </section>
                <section class="input-group">
                    <section class="email">
                        <label class="label label-email" for="email">
                            <p>Email</p>
                        </label>
                        <img class="input-icon" src="../../assets/icons/input/email.png" alt="">
                        <input class="input input-email" type="email"  placeholder="Enter Your Email">
                    </section>
                    <section class="password">
                        <label class="label label-password" for="">
                            <p>Password</p>
                        </label>
                        <img class="input-icon" src="../../assets/icons/input/password.png" alt="">
                        <input type="password" class="input input-password" placeholder="Enter Your Password">
                        <img class="eyelash" src="../../assets/icons/input/EyeSlash.png" alt="">
                    </section>
                    <section class="register-button">
                        <button class="btn" type="submit">Login</button>
                    </section>
                    <section class="opsional-login">
                        <p class="">Not Have An Account? <a href="register.html">Register</a></p>
                    </section>
                </section>
            </section>
        </section>
        <section class="icon-tab">
            <img src="../../assets/icons/ewallet/login-ewallet.png" alt="hand-wallet">
        </section>
    </main>
</body>
</html>
